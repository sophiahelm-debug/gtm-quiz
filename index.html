<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GTM Quiz – CW12</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    margin-bottom: 2rem;
  }
  .cw-label {
    display: inline-block;
    background: #FFF6DC;
    color: #B88A0E;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.3;
    margin-bottom: 0.35rem;
  }
  .header p {
    font-size: 14px;
    color: #888;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    gap: 6px;
    margin-bottom: 1.75rem;
  }
  .prog-seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: #efefef;
    transition: background 0.3s;
  }
  .prog-seg.done { background: #E6AF14; }
  .prog-seg.active { background: #C84182; }

  /* Question card */
  .q-card {
    background: #fff;
    border: 1.5px solid #f0f0f0;
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .topic-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }
  .badge-sf   { background: #FFF6DC; color: #B88A0E; }
  .badge-prod { background: #FFCBE4; color: #9E2F65; }
  .badge-ai   { background: #D9E6FF; color: #2C4F8E; }
  .badge-hey  { background: #FFF6DC; color: #B88A0E; }

  .q-number {
    font-size: 11px;
    color: #bbb;
    font-weight: 500;
    margin-bottom: 0.4rem;
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.55;
    margin-bottom: 1.25rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #fafafa;
    border: 1.5px solid #efefef;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: #1a1a1a;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s;
    text-align: left;
    width: 100%;
    line-height: 1.45;
  }
  .opt:hover:not(:disabled) {
    border-color: #E6AF14;
    background: #FFFBEE;
  }
  .opt-letter {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #efefef;
    color: #888;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: background 0.18s, color 0.18s;
  }
  .opt.correct {
    background: #edfaf4;
    border-color: #3DBD7D;
    color: #1a6641;
  }
  .opt.correct .opt-letter {
    background: #3DBD7D;
    color: #fff;
  }
  .opt.wrong {
    background: #fff0f0;
    border-color: #E0504F;
    color: #7a1f1f;
  }
  .opt.wrong .opt-letter {
    background: #E0504F;
    color: #fff;
  }
  .opt:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok   { background: #edfaf4; color: #1a6641; }
  .feedback.nope { background: #fff0f0; color: #7a1f1f; }

  /* Nav */
  .nav {
    display: flex;
    gap: 10px;
    margin-top: 0.5rem;
  }
  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: #E6AF14;
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid #e0e0e0;
    color: #555;
  }
  .btn-ghost:hover { background: #fafafa; }
  .btn:disabled { opacity: 0.35; cursor: default; }

  /* Name screen */
  .name-screen {
    background: #fff;
    border: 1.5px solid #f0f0f0;
    border-radius: 14px;
    padding: 2rem 1.5rem;
  }
  .name-screen h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }
  .name-screen p {
    font-size: 14px;
    color: #888;
    margin-bottom: 1.5rem;
  }
  .name-input {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    color: #1a1a1a;
    background: #fafafa;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: #E6AF14; background: #FFFBEE; }
  .name-err { font-size: 12px; color: #C84182; margin-top: -0.5rem; margin-bottom: 1rem; display: none; }
  .name-err.show { display: block; }

  /* Result screen */
  .result-screen {
    background: #fff;
    border: 1.5px solid #f0f0f0;
    border-radius: 14px;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .result-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 1.25rem;
  }
  .result-icon.great { background: #FFF6DC; }
  .result-icon.ok    { background: #FFCBE4; }
  .result-icon.retry { background: #D9E6FF; }
  .result-score {
    font-size: 42px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .result-pct {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 0.75rem;
  }
  .result-msg {
    font-size: 15px;
    color: #444;
    margin-bottom: 1.75rem;
    line-height: 1.5;
  }
  .sending-msg {
    font-size: 13px;
    color: #aaa;
    margin-top: 0.75rem;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="cw-label">CW 12 · 2026</div>
    <h1>Sales & Marketing Bi-Weekly</h1>
    <p>4 kurze Fragen – schnell gemacht, schnell gecheckt.</p>
  </div>

  <div class="progress-wrap" id="progress"></div>
  <div id="main"></div>

</div>

<script>
const FORM_ID   = '1EecsS7WSTtGPEotliq2swxBCr-2fFwd0JnBX_qbDnHk';
const E_NAME    = 'entry.1886770242';
const E_QUIZ    = 'entry.1279331789';
const E_SCORE   = 'entry.1794277357';
const E_PERCENT = 'entry.2089584864';

const questions = [
  {
    topic: 'Salesforce Clean Up', badge: 'badge-sf',
    q: 'Worum geht es beim Salesforce Clean Up grundsätzlich?',
    options: [
      'Ein neues CRM-Tool wird eingeführt',
      'Daten, Definitionen und Prozesse in Salesforce werden vereinheitlicht',
      'Alle alten Accounts werden gelöscht',
      'Salesforce wird durch Slack ersetzt'
    ],
    correct: 1,
    feedback: 'Genau! Ziel ist die Vereinheitlichung von Daten, Definitionen und Prozessen in Salesforce.'
  },
  {
    topic: 'Product Update', badge: 'badge-prod',
    q: 'Was können Kund:innen im Recruiter Portal künftig besser nachvollziehen?',
    options: [
      'Wie viele Bewerbungen ihre Stellenanzeigen generiert haben',
      'Welche Screening Questions Kandidat:innen herausfiltern und wo sie abbrechen',
      'Die Gehaltsbenchmarks ihrer offenen Stellen',
      'Wie lange Kandidat:innen im Prozess waren'
    ],
    correct: 1,
    feedback: 'Richtig! Kund:innen sehen künftig, welche SQs wen ausfiltern und wo Bewerbende abbrechen.'
  },
  {
    topic: 'AI in GTM', badge: 'badge-ai',
    q: 'Was ist die Hauptaufgabe von Ferdi Bärenfänger ab 1. April?',
    options: [
      'Er übernimmt die Leitung des SDR-Teams',
      'Er ist zuständig für den AI-Rollout im Vertrieb als GTM AI Adoption Champion',
      'Er entwickelt neue Produktfeatures zusammen mit R&D',
      'Er ersetzt Max Riegel als GTM Lead'
    ],
    correct: 1,
    feedback: 'Korrekt! Ferdi übernimmt die Rolle des GTM AI Adoption Champions und treibt den AI-Rollout im Vertrieb voran.'
  },
  {
    topic: 'HeyDay Berlin', badge: 'badge-hey',
    q: 'Wann und wo findet der HeyDay Berlin 2026 statt?',
    options: [
      '15. April, HeyJobs Hamburg',
      '20. Mai, HeyJobs Office Berlin',
      '10. Juni, Messe Berlin',
      '20. Mai, Axel Springer Campus Berlin'
    ],
    correct: 1,
    feedback: 'Richtig! Der HeyDay Berlin findet am 20. Mai 2026 im HeyJobs Office Berlin statt.'
  }
];

let userName = '';
let current  = 0;
let answers  = new Array(questions.length).fill(null);
let answered = new Array(questions.length).fill(false);

/* ── Progress ── */
function renderProgress() {
  const p = document.getElementById('progress');
  p.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-seg' + (i < current ? ' done' : i === current ? ' active' : '');
    p.appendChild(d);
  });
}

/* ── Name screen ── */
function renderName() {
  document.getElementById('progress').style.display = 'none';
  document.getElementById('main').innerHTML = `
    <div class="name-screen">
      <h2>Kurz vorstellen</h2>
      <p>Damit dein Ergebnis zugeordnet werden kann – dauert 2 Sekunden.</p>
      <input class="name-input" id="nameInput" type="text" placeholder="Dein Vor- und Nachname" autocomplete="off" />
      <div class="name-err" id="nameErr">Bitte gib deinen Namen ein.</div>
      <button class="btn btn-primary" onclick="startQuiz()">Quiz starten →</button>
    </div>
  `;
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });
}

function startQuiz() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) { document.getElementById('nameErr').classList.add('show'); return; }
  userName = val;
  document.getElementById('progress').style.display = 'flex';
  renderProgress();
  renderQuestion();
}

/* ── Question ── */
function renderQuestion() {
  if (current >= questions.length) { renderResult(); return; }
  const q = questions[current];
  document.getElementById('main').innerHTML = `
    <div class="q-card">
      <div class="topic-badge ${q.badge}">${q.topic}</div>
      <div class="q-number">Frage ${current + 1} von ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="opt" onclick="pick(${i})" id="opt-${i}">
            <span class="opt-letter">${String.fromCharCode(65 + i)}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>← Zurück</button>
      <button class="btn btn-primary" id="next-btn" onclick="go(1)" style="display:${answered[current] ? 'inline-flex' : 'none'}">
        ${current === questions.length - 1 ? 'Auswertung →' : 'Weiter →'}
      </button>
    </div>
  `;
  if (answered[current]) restoreState();
  renderProgress();
}

function pick(idx) {
  if (answered[current]) return;
  answered[current] = true;
  answers[current]  = idx;
  const q = questions[current];
  q.options.forEach((_, i) => {
    const btn = document.getElementById('opt-' + i);
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx)  btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (idx === q.correct ? 'ok' : 'nope');
  fb.textContent = (idx === q.correct ? '✓ ' : '✗ Leider falsch. ') + q.feedback;
  document.getElementById('next-btn').style.display = 'inline-flex';
}

function restoreState() {
  const q   = questions[current];
  const idx = answers[current];
  q.options.forEach((_, i) => {
    const btn = document.getElementById('opt-' + i);
    btn.disabled = true;
    if (i === q.correct)              btn.classList.add('correct');
    else if (i === idx && i !== q.correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (idx === q.correct ? 'ok' : 'nope');
  fb.textContent = (idx === q.correct ? '✓ ' : '✗ Leider falsch. ') + q.feedback;
}

function go(dir) {
  current = Math.max(0, current + dir);
  renderQuestion();
}

/* ── Result + Google Form submit ── */
function renderResult() {
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct   = Math.round(score / questions.length * 100);
  let icon, iconClass, msg;
  if (pct === 100) {
    icon = '🏆'; iconClass = 'great';
    msg  = 'Perfekt! Du hast den Artikel aufmerksam gelesen.';
  } else if (pct >= 50) {
    icon = '👍'; iconClass = 'ok';
    msg  = 'Gut gemacht! Schau dir die Details kurz nochmal an.';
  } else {
    icon = '📖'; iconClass = 'retry';
    msg  = 'Schnell den Artikel nochmal überfliegen – dauert nur 2 Minuten!';
  }

  document.getElementById('progress').innerHTML = '';
  document.getElementById('main').innerHTML = `
    <div class="result-screen">
      <div class="result-icon ${iconClass}">${icon}</div>
      <div class="result-score">${score} / ${questions.length}</div>
      <div class="result-pct">${pct}% richtig</div>
      <div class="result-msg">${msg}</div>
      <button class="btn btn-primary" onclick="restart()">Nochmal versuchen</button>
      <div class="sending-msg" id="sending">Ergebnis wird gespeichert…</div>
    </div>
  `;

  submitToForm(score, pct);
}

function submitToForm(score, pct) {
  const quizLabel = 'CW12';
  const url = `https://docs.google.com/forms/d/${FORM_ID}/formResponse?` +
    `${E_NAME}=${encodeURIComponent(userName)}&` +
    `${E_QUIZ}=${encodeURIComponent(quizLabel)}&` +
    `${E_SCORE}=${encodeURIComponent(score + ' / ' + questions.length)}&` +
    `${E_PERCENT}=${encodeURIComponent(pct + '%')}&` +
    `submit=Submit`;

  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.name = 'hidden_submit';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = url;
  form.target = 'hidden_submit';
  document.body.appendChild(form);
  form.submit();

  setTimeout(() => {
    const msg = document.getElementById('sending');
    if (msg) msg.textContent = 'Ergebnis gespeichert ✓';
  }, 2000);
}

function restart() {
  current  = 0;
  answers  = new Array(questions.length).fill(null);
  answered = new Array(questions.length).fill(false);
  renderProgress();
  renderQuestion();
}

/* ── Init ── */
renderName();
</script>
</body>
</html>
