<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTM Quiz – CW15</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #E6AF14;
      --gold-muted: #FFF6DC;
      --pink:       #C84182;
      --pink-muted: #FFCBE4;
      --blue:       #3C69BE;
      --blue-muted: #D9E6FF;
      --text:       #222222;
      --text-light: #666666;
      --bg:         #ffffff;
      --radius:     10px;
      --font:       'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 2rem;
    }
    .kw-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--gold-muted);
      color: #8a6200;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: var(--text-light);
    }

    /* ── Name input screen ── */
    #name-screen {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .name-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .name-input {
      width: 100%;
      padding: 12px 14px;
      font-family: var(--font);
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
      color: var(--text);
    }
    .name-input:focus { border-color: var(--blue); }
    .name-err {
      font-size: 12px;
      color: var(--pink);
      display: none;
      margin-top: -4px;
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 1.5rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .progress-track {
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Question card ── */
    .q-card {
      background: #fff;
      border: 1px solid #eeeeee;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .q-topic {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--text);
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 8px; }
    .opt-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      text-align: left;
      background: #fafafa;
      border: 1.5px solid #e8e8e8;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.5;
    }
    .opt-btn:hover:not(:disabled) {
      background: var(--blue-muted);
      border-color: var(--blue);
    }
    .opt-btn .letter {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e8e8e8;
      color: #555;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: background 0.15s, color 0.15s;
    }
    .opt-btn.correct {
      background: #edfaf3;
      border-color: #2daa6b;
    }
    .opt-btn.correct .letter {
      background: #2daa6b;
      color: #fff;
    }
    .opt-btn.wrong {
      background: var(--pink-muted);
      border-color: var(--pink);
    }
    .opt-btn.wrong .letter {
      background: var(--pink);
      color: #fff;
    }
    .opt-btn.reveal {
      background: #edfaf3;
      border-color: #2daa6b;
      opacity: 0.6;
    }
    .opt-btn.reveal .letter {
      background: #2daa6b;
      color: #fff;
    }

    /* ── Feedback ── */
    .feedback {
      font-size: 13px;
      line-height: 1.55;
      padding: 12px 14px;
      border-radius: var(--radius);
      margin-top: 10px;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: #edfaf3; color: #1a6e46; border: 1px solid #b2e8cc; }
    .feedback.wrong   { background: var(--pink-muted); color: #8a1f4d; border: 1px solid #f0a3c4; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 22px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--gold);
      color: #3d2a00;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #ddd;
      color: var(--text);
    }
    .btn-outline:hover { background: #f5f5f5; }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    /* ── Score screen ── */
    #score-screen { display: none; }
    .score-hero {
      text-align: center;
      padding: 2rem 0 1.5rem;
    }
    .score-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--gold-muted);
      border: 3px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .score-num { font-size: 28px; font-weight: 600; color: #3d2a00; }
    .score-denom { font-size: 13px; color: #8a6200; }
    .score-msg { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
    .score-sub { font-size: 13px; color: var(--text-light); }
    .summary-list { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 8px; }
    .summary-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: #fafafa;
      border: 1px solid #eee;
    }
    .summary-item .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .dot-ok  { background: #2daa6b; }
    .dot-err { background: var(--pink); }

    /* ── Form submit ── */
    .submit-section {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--blue-muted);
      border-radius: 12px;
      border: 1px solid #c0d4f8;
    }
    .submit-section p { font-size: 13px; color: #1e3a6e; margin-bottom: 12px; }
    .submit-status { font-size: 13px; margin-top: 10px; color: var(--text-light); display: none; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="kw-badge">CW 15 · 2026</div>
    <h1>Sales &amp; Marketing Bi-Weekly</h1>
    <p>5 kurze Fragen – schnell gemacht, schnell gecheckt.</p>
  </div>

  <!-- Name screen -->
  <div id="name-screen">
    <div class="name-label">Wie heißt du?</div>
    <input class="name-input" id="name-input" type="text" placeholder="Vor- und Nachname" autocomplete="name" />
    <div class="name-err" id="name-err">Bitte gib deinen Namen ein.</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startQuiz()">Quiz starten →</button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Frage 1 von 5</span>
        <span id="prog-pct">0 %</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="q-card">
      <div class="q-topic" id="q-topic"></div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>

    <div class="btn-row">
      <button class="btn btn-outline hidden" id="next-btn" onclick="nextQuestion()">Weiter →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div id="score-screen">
    <div class="score-hero">
      <div class="score-ring">
        <div class="score-num" id="s-num"></div>
        <div class="score-denom" id="s-denom"></div>
      </div>
      <div class="score-msg" id="s-msg"></div>
      <div class="score-sub" id="s-sub"></div>
    </div>

    <div class="summary-list" id="summary-list"></div>

    <div class="submit-section">
      <p>Dein Ergebnis wird automatisch übermittelt – nichts weiter nötig.</p>
      <button class="btn btn-primary" id="submit-btn" onclick="submitScore()">Ergebnis absenden ↗</button>
      <div class="submit-status" id="submit-status"></div>
    </div>

    <div class="btn-row" style="margin-top:1rem;">
      <button class="btn btn-outline" onclick="restartQuiz()">Nochmal versuchen</button>
    </div>
  </div>

</div>

<script>
  const FORM_ID   = "1EecsS7WSTtGPEotliq2swxBCr-2fFwd0JnBX_qbDnHk";
  const E_NAME    = "entry.1886770242";
  const E_QUIZ    = "entry.1279331789";
  const E_SCORE   = "entry.1794277357";
  const E_PERCENT = "entry.2089584864";
  const QUIZ_NAME = "CW15";

  const questions = [
    {
      topic: "Jobbörse Update",
      q: "Welcher Effekt hat die neue Stellen-Deduplizierung auf der Jobbörse nach 2 Wochen erzielt?",
      type: "mc",
      options: [
        "Doppelt so viele Bewerbungen wie vorher",
        "Von 17.032 auf über 91.000 Bewerbungen pro Woche",
        "Rückgang der Views durch mehr Konkurrenz",
        "Keine messbaren Effekte bisher"
      ],
      correct: 1,
      explanation: "Die Umstellung auf Stellen-Deduplizierung steigerte die Bewerbungen von 17.032 auf 91.179 pro Woche – besonders stark in Logistik, Filialistik und Pflege-Ausbildung."
    },
    {
      topic: "StepStone AllJobs Positionierung",
      q: "Was ist das zentrale Argument gegen StepStone AllJobs im Kundengespräch?",
      type: "mc",
      options: [
        "AllJobs ist deutlich teurer im Gesamtpreis",
        "AllJobs hat keinen Performance-Algorithmus",
        "Der Durchschnittspreis sinkt, aber wichtige Rollen werden teurer und underperformen",
        "AllJobs bietet keine Festpreise an"
      ],
      correct: 2,
      explanation: "AllJobs behandelt alle Jobs gleich – ineffiziente Budgetverteilung. Durchschnittspreis sinkt, kritische Rollen werden teurer und schlechter besetzt. Festpreis ist keine echte Sicherheit, Performance ist es."
    },
    {
      topic: "Case Study Stadtverwaltung Konstanz",
      q: "Warum eignet sich HeyJobs besonders gut für den öffentlichen Sektor – wie das Beispiel Stadtverwaltung Konstanz zeigt?",
      type: "mc",
      options: [
        "HeyJobs bietet spezielle Behörden-Rabatte",
        "REACH erreicht passive Kandidat:innen auch bei eingeschränkter Social-Media-Nutzung",
        "Die Stadt Konstanz nutzt ausschließlich Print-Werbung",
        "HeyJobs ist die einzige Plattform mit DSGVO-Konformität"
      ],
      correct: 1,
      explanation: "Öffentliche Institutionen haben oft restriktive Social-Media-Vorgaben. REACH gleicht das aus und erschließt trotzdem eine große Zielgruppe für passive Talente."
    },
    {
      topic: "Produkt-Update REACH / HIRE",
      q: "Was zeigt das neue Feature im REACH-/HIRE-Produkt bezüglich abgelehnter Talente?",
      type: "mc",
      options: [
        "Abgelehnte Talente werden automatisch erneut angeschrieben",
        "Kandidat:innen können Ablehnungsgründe anfechten",
        "Recruiter sehen transparent, warum Kandidat:innen durch Auswahlfragen herausgefiltert wurden",
        "Das Feature ist noch in der Beta-Phase und nicht sichtbar"
      ],
      correct: 2,
      explanation: "Das neue Feature bietet volle Transparenz: Alle automatisch abgelehnten Talente durch Auswahlfragen werden klar dargestellt. Außerdem steigern Algorithmusoptimierungen Bewerbungen um bis zu +16 % gegenüber Januar-Peak."
    },
    {
      topic: "Bookit Migration",
      q: "Bis wann muss die Migration von YCBM auf Bookit abgeschlossen sein, und was passiert danach?",
      type: "mc",
      options: [
        "Bis 30. April; YCBM wird dann kostenpflichtig",
        "Bis 10. April; YCBM wird am 13. April abgeschaltet",
        "Bis Ende Q2; YCBM läuft parallel weiter",
        "Keine Deadline; Migration ist freiwillig"
      ],
      correct: 1,
      explanation: "Die Migration muss bis zum 10. April abgeschlossen sein. Am 13. April wird YCBM endgültig abgeschaltet. Bookit ist vollständig in LeanData integriert."
    }
  ];

  const LETTERS = ["A", "B", "C", "D"];
  let current = 0, score = 0, answers = [], userName = "";

  function startQuiz() {
    const input = document.getElementById("name-input");
    const err   = document.getElementById("name-err");
    if (!input.value.trim()) { err.style.display = "block"; input.focus(); return; }
    err.style.display = "none";
    userName = input.value.trim();
    document.getElementById("name-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[current];
    const total = questions.length;
    const pct   = Math.round((current / total) * 100);

    document.getElementById("prog-label").textContent = `Frage ${current + 1} von ${total}`;
    document.getElementById("prog-pct").textContent   = pct + " %";
    document.getElementById("prog-fill").style.width  = pct + "%";
    document.getElementById("q-topic").textContent    = q.topic;
    document.getElementById("q-text").textContent     = q.q;

    const opts = document.getElementById("options");
    opts.innerHTML = "";
    q.options.forEach((text, i) => {
      const btn = document.createElement("button");
      btn.className = "opt-btn";
      btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span>${text}</span>`;
      btn.onclick = () => selectAnswer(i);
      opts.appendChild(btn);
    });

    const fb = document.getElementById("feedback");
    fb.className = "feedback";
    fb.textContent = "";
    document.getElementById("next-btn").classList.add("hidden");
  }

  function selectAnswer(idx) {
    const q    = questions[current];
    const btns = document.querySelectorAll(".opt-btn");
    btns.forEach(b => b.disabled = true);

    const correct = idx === q.correct;
    if (correct) score++;
    answers.push({ question: q.q, topic: q.topic, selected: idx, correct: q.correct, ok: correct });

    btns.forEach((b, i) => {
      if (i === q.correct) b.classList.add(correct ? "correct" : "reveal");
      else if (i === idx)  b.classList.add("wrong");
    });

    const fb = document.getElementById("feedback");
    fb.className = "feedback show " + (correct ? "correct" : "wrong");
    fb.textContent = (correct ? "✓ Richtig! " : "✗ Leider falsch. ") + q.explanation;

    document.getElementById("next-btn").classList.remove("hidden");
    document.getElementById("next-btn").textContent =
      current < questions.length - 1 ? "Weiter →" : "Ergebnis sehen →";
  }

  function nextQuestion() {
    current++;
    if (current >= questions.length) showScore();
    else renderQuestion();
  }

  function showScore() {
    document.getElementById("quiz-screen").classList.add("hidden");
    const ss = document.getElementById("score-screen");
    ss.style.display = "block";

    const pct = Math.round((score / questions.length) * 100);
    document.getElementById("s-num").textContent   = score;
    document.getElementById("s-denom").textContent = "/ " + questions.length;

    let msg, sub;
    if (pct === 100) { msg = "Perfekt! 🎉"; sub = "Alle Updates drauf – beeindruckend."; }
    else if (pct >= 80) { msg = "Sehr gut!"; sub = "Du kennst die wichtigsten Updates."; }
    else if (pct >= 60) { msg = "Solide."; sub = "Noch ein bisschen üben – du schaffst das."; }
    else { msg = "Nochmal durchlesen!"; sub = "Die Bi-Weekly lohnt sich – versprochen."; }

    document.getElementById("s-msg").textContent = msg;
    document.getElementById("s-sub").textContent = sub;

    const list = document.getElementById("summary-list");
    list.innerHTML = answers.map(a =>
      `<div class="summary-item">
        <div class="dot ${a.ok ? "dot-ok" : "dot-err"}"></div>
        <div><strong>${a.topic}</strong><br>${a.question}</div>
      </div>`
    ).join("");
  }

  function submitScore() {
    const pct = Math.round((score / questions.length) * 100);
    const url = `https://docs.google.com/forms/d/${FORM_ID}/formResponse`
      + `?${E_NAME}=${encodeURIComponent(userName)}`
      + `&${E_QUIZ}=${encodeURIComponent(QUIZ_NAME)}`
      + `&${E_SCORE}=${score}`
      + `&${E_PERCENT}=${pct}`
      + `&submit=Submit`;

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    const btn    = document.getElementById("submit-btn");
    const status = document.getElementById("submit-status");
    btn.disabled = true;
    btn.textContent = "Gesendet ✓";
    btn.style.opacity = "0.6";
    status.style.display = "block";
    status.textContent = "Ergebnis wurde übermittelt. Danke, " + userName + "!";
  }

  function restartQuiz() {
    current = 0; score = 0; answers = [];
    document.getElementById("score-screen").style.display = "none";
    document.getElementById("name-screen").classList.remove("hidden");
    document.getElementById("name-input").value = "";
    document.getElementById("submit-btn").disabled = false;
    document.getElementById("submit-btn").textContent = "Ergebnis absenden ↗";
    document.getElementById("submit-btn").style.opacity = "1";
    document.getElementById("submit-status").style.display = "none";
  }

  document.getElementById("name-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") startQuiz();
  });
</script>
</body>
</html>
