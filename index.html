<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GTM Quiz – CW 16</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #E6AF14;
    --gold-muted: #FFF6DC;
    --gold-dark: #b88a0e;
    --pink: #C84182;
    --pink-muted: #FFCBE4;
    --blue: #3C69BE;
    --blue-muted: #D9E6FF;
    --text: #1a1a1a;
    --text-muted: #666;
    --bg: #ffffff;
    --surface: #f9f9f9;
    --border: #e8e8e8;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header-badge {
    display: inline-block;
    background: var(--gold-muted);
    color: var(--gold-dark);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .header p {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 1.75rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
  }

  /* Name screen */
  .name-screen {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem 1.75rem;
    text-align: center;
  }
  .name-screen .icon {
    width: 52px;
    height: 52px;
    background: var(--gold-muted);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 24px;
  }
  .name-screen h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }
  .name-screen p {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }
  .name-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .name-input:focus { border-color: var(--gold); }

  /* Question card */
  .q-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1rem;
  }
  .q-topic {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--pink);
    background: var(--pink-muted);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 0.85rem;
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: var(--gold-muted);
    transform: translateX(3px);
  }
  .opt-btn .letter {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: white;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .opt-btn:hover:not(:disabled) .letter {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
  }
  .opt-btn.correct {
    border-color: #3a9c5e;
    background: #edf8f2;
    color: #1a5c33;
  }
  .opt-btn.correct .letter {
    background: #3a9c5e;
    border-color: #3a9c5e;
    color: white;
  }
  .opt-btn.wrong {
    border-color: var(--pink);
    background: var(--pink-muted);
    color: #7a1a40;
  }
  .opt-btn.wrong .letter {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
  }
  .opt-btn.reveal {
    border-color: #3a9c5e;
    background: #edf8f2;
    color: #1a5c33;
    opacity: 0.65;
  }
  .opt-btn.reveal .letter {
    background: #3a9c5e;
    border-color: #3a9c5e;
    color: white;
  }
  .opt-btn:disabled { cursor: default; transform: none; }

  /* Feedback */
  .feedback {
    margin-top: 1rem;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .feedback.ok { background: #edf8f2; color: #1a5c33; border: 1px solid #b0dfc0; }
  .feedback.nok { background: var(--pink-muted); color: #7a1a40; border: 1px solid #f0a0c0; }
  .feedback-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 13px 20px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--gold);
    color: #3a2800;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--gold-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Score screen */
  .score-screen {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1.75rem;
    text-align: center;
  }
  .score-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--gold-muted);
    border: 3px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .score-num { font-size: 30px; font-weight: 700; color: var(--gold-dark); line-height: 1; }
  .score-denom { font-size: 13px; color: var(--gold-dark); font-weight: 500; }
  .score-screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 0.4rem; }
  .score-screen .msg { font-size: 14px; color: var(--text-muted); margin-bottom: 1.75rem; line-height: 1.6; }
  .sent-note { font-size: 13px; color: var(--text-muted); margin-top: 0.75rem; }
  .sent-note span { color: #3a9c5e; font-weight: 600; }
  .btn-outline {
    display: inline-block;
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gold);
    background: transparent;
    color: var(--gold-dark);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 0.75rem;
    transition: background 0.15s;
  }
  .btn-outline:hover { background: var(--gold-muted); }

  .hidden { display: none; }
  .action-row { margin-top: 1rem; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-badge">CW 16 · 2026</div>
    <h1>GTM Weekly Quiz</h1>
    <p>Sales &amp; Marketing Bi-Weekly — 5 kurze Fragen, schnell gemacht.</p>
  </div>

  <!-- Name Screen -->
  <div id="name-screen" class="name-screen">
    <div class="icon">👋</div>
    <h2>Wie heißt du?</h2>
    <p>Vor- und Nachname eingeben, dann geht's los.</p>
    <input type="text" id="name-input" class="name-input" placeholder="Vorname Nachname" autocomplete="name" />
    <button class="btn-primary" onclick="startQuiz()">Quiz starten →</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="q-counter">Frage 1 von 5</span>
        <span id="q-score">0 richtig</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    </div>
    <div id="q-body"></div>
  </div>

  <!-- Score Screen -->
  <div id="score-screen" class="score-screen hidden">
    <div class="score-circle">
      <div class="score-num" id="final-score">0</div>
      <div class="score-denom">von 5</div>
    </div>
    <h2 id="final-title">Gut gemacht!</h2>
    <div class="msg" id="final-msg"></div>
    <button class="btn-primary" id="submit-btn" onclick="submitScore()">Ergebnis abschicken</button>
    <div class="sent-note hidden" id="sent-note"><span>✓ Abgeschickt!</span> Danke fürs Mitmachen.</div>
    <br/>
    <button class="btn-outline" onclick="restartQuiz()">Nochmal versuchen</button>
  </div>

</div>

<script>
const FORM_ID = "1EecsS7WSTtGPEotliq2swxBCr-2fFwd0JnBX_qbDnHk";
const ENTRIES = {
  name:    "entry.1886770242",
  quiz:    "entry.1279331789",
  score:   "entry.1794277357",
  percent: "entry.2089584864"
};
const QUIZ_NAME = "GTM Quiz CW16";

const questions = [
  {
    topic: "Account Dokumentation",
    q: "In welchem Format sollen Timestamps bei der Account-Dokumentation in Salesforce ab sofort eingetragen werden?",
    type: "mc",
    opts: ["dd.mm.jjjj Vorname Nachname", "jjj-mm-dd hh:mm Vorname Nachname", "hh:mm dd-mm-jjjj Nachname", "Freitext – kein Standard notwendig"],
    correct: 1,
    explain: "Das neue Pflichtformat lautet: jjj-mm-dd hh:mm Vorname Nachname (inkl. Reihenfolge). Chrome Extensions wie Text Blaze oder Briskine können diesen Timestamp automatisch per Shortcut einfügen."
  },
  {
    topic: "Account Dokumentation",
    q: "Welches Tool hilft dabei, Timestamps in Salesforce automatisch per Shortcut einzufügen?",
    type: "mc",
    opts: ["Grammarly oder DeepL", "Text Blaze oder Briskine", "Notion oder Confluence", "Zapier oder Make"],
    correct: 1,
    explain: "Text Blaze und Briskine sind Chrome Extensions, die einen Shortcut anlegen, der automatisch Timestamp + Name einfügt – das spart Zeit und sorgt für einheitliche Dokumentation."
  },
  {
    topic: "Joblift Insolvenz",
    q: "Was ist der wesentliche Unterschied zwischen dem Geschäftsmodell von Joblift und HeyJobs?",
    type: "mc",
    opts: ["Joblift hat mehr Kunden als HeyJobs", "Joblift ist eine Metasuchmaschine, HeyJobs nutzt Performance Recruiting", "HeyJobs ist ebenfalls eine Metasuchmaschine", "Beide Plattformen nutzen das gleiche Modell"],
    correct: 1,
    explain: "Joblift verkauft Traffic an Indeed & andere (Metasuchmaschine). HeyJobs setzt auf Performance Recruiting für effiziente Prozesse – ein wichtiger Differenzierungspunkt im Kundengespräch."
  },
  {
    topic: "Joblift Insolvenz",
    q: "Wie soll das Sales-Team mit der Joblift-Insolvenz im Kundengespräch umgehen?",
    type: "mc",
    opts: ["Aktiv bei allen Kund:innen proaktiv ansprechen", "Das Thema komplett ignorieren und ausweichen", "Nicht proaktiv thematisieren, aber auf Fragen vorbereitet sein", "Nur intern kommunizieren, keine Kunden informieren"],
    correct: 2,
    explain: "Die Empfehlung: nicht proaktiv ansprechen, aber vorbereitet sein. Wenn Kund:innen fragen, HeyJobs-Stabilität und Differenzierung erklären und ggf. Übergang mit Job-Import / 70+ ATS-Integrationen anbieten."
  },
  {
    topic: "ATS Screeningfragen",
    q: "Für welche ATS-Systeme ist das Screeningfragen Import/Export-Feature aktuell live?",
    type: "mc",
    opts: ["Workday & SAP SuccessFactors", "Personio & Greenhouse", "REXX & softgarden", "Taleo & Lever"],
    correct: 2,
    explain: "Das Feature ist live für REXX und softgarden. Screeningfragen können aus dem ATS zu HeyJobs importiert und Antworten zurück ins ATS exportiert werden – das spart Zeit und sorgt für Systemkonsistenz."
  }
];

let userName = "";
let current = 0;
let score = 0;
let answered = false;

function startQuiz() {
  const val = document.getElementById("name-input").value.trim();
  if (!val) { document.getElementById("name-input").focus(); return; }
  userName = val;
  document.getElementById("name-screen").classList.add("hidden");
  document.getElementById("quiz-screen").classList.remove("hidden");
  current = 0; score = 0;
  renderQ();
}

function renderQ() {
  answered = false;
  const q = questions[current];
  const total = questions.length;
  document.getElementById("q-counter").textContent = "Frage " + (current + 1) + " von " + total;
  document.getElementById("q-score").textContent = score + " richtig";
  document.getElementById("prog").style.width = (current / total * 100) + "%";

  const letters = ["A", "B", "C", "D"];
  const optsHTML = q.opts.map((o, i) =>
    `<button class="opt-btn" id="opt${i}" onclick="pick(${i})">
      <span class="letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`
  ).join("");

  document.getElementById("q-body").innerHTML = `
    <div class="q-card">
      <div class="q-topic">${q.topic}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      <div id="feedback"></div>
    </div>
    <div class="action-row hidden" id="next-wrap">
      <button class="btn-primary" onclick="nextQ()">${current < total - 1 ? "Nächste Frage →" : "Ergebnis ansehen →"}</button>
    </div>
  `;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = i === q.correct;
  if (isCorrect) score++;

  const letters = ["A", "B", "C", "D"];
  q.opts.forEach((_, idx) => {
    const btn = document.getElementById("opt" + idx);
    btn.disabled = true;
    if (idx === q.correct) {
      btn.classList.add(isCorrect ? "correct" : "reveal");
    } else if (idx === i) {
      btn.classList.add("wrong");
    }
  });

  const fb = document.getElementById("feedback");
  if (isCorrect) {
    fb.innerHTML = `<div class="feedback ok"><span class="feedback-icon">✓</span><span><strong>Richtig!</strong> ${q.explain}</span></div>`;
  } else {
    fb.innerHTML = `<div class="feedback nok"><span class="feedback-icon">✗</span><span><strong>Leider falsch.</strong> ${q.explain}</span></div>`;
  }

  document.getElementById("q-score").textContent = score + " richtig";
  document.getElementById("next-wrap").classList.remove("hidden");
}

function nextQ() {
  current++;
  if (current >= questions.length) {
    showScore();
  } else {
    renderQ();
  }
}

function showScore() {
  document.getElementById("quiz-screen").classList.add("hidden");
  const pct = Math.round(score / questions.length * 100);
  document.getElementById("final-score").textContent = score;
  document.getElementById("prog").style.width = "100%";

  let title = "Gut gemacht!";
  let msg = "Du hast " + score + " von " + questions.length + " Fragen richtig beantwortet (" + pct + "%). Schau dir die Themen nochmal an und bleib auf dem Laufenden!";
  if (score === questions.length) {
    title = "Perfekt! 🏆";
    msg = "Alle 5 Fragen richtig – du hast die Themen aus CW 16 vollständig drauf. Top vorbereitet!";
  } else if (score >= 4) {
    title = "Fast perfekt! ⭐";
    msg = score + " von 5 richtig (" + pct + "%) – sehr solide. Du bist gut für Kundengespräche gewappnet.";
  } else if (score >= 3) {
    title = "Gut gemacht!";
    msg = score + " von 5 richtig (" + pct + "%). Die Grundlagen sitzen – ein nochmaliges Durchlesen lohnt sich.";
  } else {
    title = "Noch Luft nach oben";
    msg = score + " von 5 richtig (" + pct + "%). Schau dir die CW 16 Updates nochmal an – die Themen sind wichtig für den Alltag.";
  }

  document.getElementById("final-title").textContent = title;
  document.getElementById("final-msg").textContent = msg;
  document.getElementById("score-screen").classList.remove("hidden");
}

function submitScore() {
  const pct = Math.round(score / questions.length * 100) + "%";
  const url = "https://docs.google.com/forms/d/" + FORM_ID + "/formResponse?" +
    ENTRIES.name + "=" + encodeURIComponent(userName) + "&" +
    ENTRIES.quiz + "=" + encodeURIComponent(QUIZ_NAME) + "&" +
    ENTRIES.score + "=" + encodeURIComponent(score + "/" + questions.length) + "&" +
    ENTRIES.percent + "=" + encodeURIComponent(pct) +
    "&submit=Submit";

  const img = new Image();
  img.src = url;

  document.getElementById("submit-btn").disabled = true;
  document.getElementById("sent-note").classList.remove("hidden");
}

function restartQuiz() {
  current = 0; score = 0; answered = false;
  document.getElementById("score-screen").classList.add("hidden");
  document.getElementById("sent-note").classList.add("hidden");
  document.getElementById("submit-btn").disabled = false;
  document.getElementById("quiz-screen").classList.remove("hidden");
  renderQ();
}

document.getElementById("name-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") startQuiz();
});
</script>
</body>
</html>
